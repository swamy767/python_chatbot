<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSIT ECE Chatbot</title>
    <!-- Add FontAwesome and external fonts -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">

    <style>
        /* CSS Reset & Basic Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            height: 100%;
            font-family: 'Outfit', sans-serif;
            /* Premium dark mode gradient */
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f1f5f9;
        }

        /* Notes Search Interface embedded in Chat */
        .notes-search-input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(139, 92, 246, 0.4);
            background: rgba(15, 23, 42, 0.8);
            color: #f8fafc;
            margin-bottom: 12px;
            font-family: inherit;
        }
        .notes-search-input::placeholder { color: #94a3b8; }
        .notes-search-input:focus { outline: none; border-color: #8b5cf6; }
        
        .subject-section {
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
        }
        .subject-section h4 {
            color: #c4b5fd;
            margin-bottom: 8px;
            font-size: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 4px;
        }
        .notes-list {
            list-style: none;
            padding-left: 0;
            margin: 0;
        }
        .notes-list li {
            margin-bottom: 6px;
            display: flex;
            align-items: center;
        }
        .notes-list li::before {
            content: "📄";
            margin-right: 8px;
            font-size: 0.85rem;
        }
        .notes-list a {
            color: #f1f5f9;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .notes-list a:hover {
            color: #a78bfa;
            text-decoration: underline;
        }

        /* Layout Container */
        .app-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        /* Main Chat Card with Glassmorphism */
        .chat-card {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .chat-header {
            padding: 20px 25px;
            background: rgba(15, 23, 42, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .bot-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #8b5cf6;
            padding: 2px;
            background: #fff;
        }

        .bot-info h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #10b981;
        }

        .bot-info p {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        /* Category Selector Area */
        .category-section {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: '\f107';
            /* FontAwesome angle-down */
            font-family: 'Font Awesome 5 Free';
            font-weight: 900;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #8b5cf6;
            pointer-events: none;
        }

        .category-select {
            width: 100%;
            appearance: none;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            padding: 12px 15px;
            color: #f8fafc;
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-select:focus {
            outline: none;
            border-color: #8b5cf6;
            background: rgba(255, 255, 255, 0.1);
        }

        .category-select option {
            background-color: #1e293b;
            color: #f8fafc;
        }

        /* Generated Sub-options */
        .sub-options-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 15px 20px 5px;
            scrollbar-width: thin;
            scrollbar-color: rgba(139, 92, 246, 0.5) transparent;
        }

        .sub-options-container::-webkit-scrollbar {
            height: 6px;
        }

        .sub-options-container::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.5);
            border-radius: 10px;
        }

        .sub-option-btn {
            background: rgba(139, 92, 246, 0.15);
            color: #c4b5fd;
            border: 1px solid rgba(139, 92, 246, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .sub-option-btn:hover {
            background: #8b5cf6;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }

        /* Chat Body */
        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }

        /* Messages */
        .message-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            max-width: 85%;
        }

        .message-wrapper.bot {
            align-self: flex-start;
        }

        .message-wrapper.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
        }

        .message-wrapper.bot .message-bubble {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom-left-radius: 4px;
            color: #f8fafc;
        }

        .message-wrapper.user .message-bubble {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-bottom-right-radius: 4px;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .msg-time {
            display: block;
            font-size: 0.7rem;
            margin-top: 6px;
            opacity: 0.6;
            text-align: right;
        }

        .message-wrapper.bot .msg-time {
            text-align: left;
        }

        /* Footer / Input Area */
        .chat-footer {
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-group {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 30px;
            padding: 6px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .type_msg {
            flex: 1;
            background: transparent;
            border: none;
            color: #f8fafc;
            padding: 10px 15px;
            font-family: inherit;
            font-size: 0.95rem;
        }

        .type_msg:focus {
            outline: none;
        }

        .type_msg::placeholder {
            color: #64748b;
        }

        .action-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
        }

        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(99, 102, 241, 0.4);
        }

        .action-btn.mic {
            background: rgba(255, 255, 255, 0.1);
            color: #a78bfa;
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .action-btn.mic:hover {
            background: rgba(139, 92, 246, 0.2);
            color: #c4b5fd;
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: fit-content;
            margin-bottom: 10px;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #a78bfa;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40%           { transform: scale(1); }
        }

        /* ── Mobile Responsive ───────────────────────────────────────────── */
        @media (max-width: 640px) {
            body, html {
                height: 100%;
                overflow: hidden; /* prevent double scroll bars */
            }

            .app-container {
                padding: 0;          /* remove desktop padding */
                align-items: stretch;
                height: 100vh;
                height: 100dvh;      /* dynamic viewport on mobile browsers */
            }

            .chat-card {
                max-width: 100%;     /* full width */
                height: 100vh;
                height: 100dvh;      /* fills the whole screen */
                border-radius: 0;    /* no rounded corners on phone edge */
                border: none;
            }

            .chat-header {
                padding: 12px 15px;
            }

            .bot-avatar {
                width: 40px;
                height: 40px;
            }

            .bot-info h2 {
                font-size: 1rem;
            }

            .bot-info p {
                font-size: 0.75rem;
            }

            .category-section {
                padding: 10px 12px;
            }

            .sub-options-container {
                padding: 10px 12px 4px;
            }

            .chat-body {
                padding: 12px;
                gap: 10px;
            }

            .message-wrapper {
                max-width: 90%;
            }

            .message-bubble {
                font-size: 0.9rem;
                padding: 10px 13px;
            }

            .chat-footer {
                padding: 10px 12px;
            }

            .type_msg {
                font-size: 0.9rem;
                padding: 8px 10px;
            }

            .action-btn {
                width: 38px;
                height: 38px;
            }
        }
    </style>
</head>

<body>

    <div class="app-container">
        <div class="chat-card">
            <!-- Header -->
            <div class="chat-header">
                <img src="https://ssit.edu.in/img/sri-siddhartha-institute-of-technology-ssit-logo.png"
                    class="bot-avatar" alt="SSIT Logo">
                <div class="bot-info">
                    <h2>SSIT ECE Bot <span class="online-dot"></span></h2>
                    <p>Ask me anything about the ECE branch</p>
                </div>
                <button type="button" id="toggleSpeech" class="action-btn mic" title="Enable Auto-Speech"
                    style="margin-left: auto;">
                    <i class="fas fa-volume-mute" id="speechIcon"></i>
                </button>
            </div>

            <!-- Category Selector -->
            <div class="category-section">
                <div class="select-wrapper">
                    <select id="categorySelect" class="category-select">
                        <option value="" disabled selected>Browse Categories (e.g. Fees, Placements)...</option>
                        <!-- Options populated via JS -->
                    </select>
                </div>
            </div>

            <!-- Sub-options Container area -->
            <div id="subOptionsContainer" class="sub-options-container" style="display: none;">
                <!-- Buttons populated via JS -->
            </div>

            <!-- Chat Messages -->
            <div id="chatBody" class="chat-body">
                <!-- Messages go here -->
                <div class="message-wrapper bot">
                    <img src="https://i.ibb.co/fSNP7Rz/icons8-chatgpt-512.png" class="msg-avatar" alt="Bot">
                    <div class="message-bubble">
                        Hello! I'm the SSIT ECE assistant. You can select a category above or type your question below.
                        <span class="msg-time bot-time">Just now</span>
                    </div>
                </div>

                <!-- Typing Indicator -->
                <div id="typingIndicator" class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <!-- Footer / Input -->
            <div class="chat-footer">
                <form id="messageArea" class="input-group">
                    <button type="button" id="startListening" class="action-btn mic" title="Voice Input">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <input type="text" id="text" name="msg" placeholder="Type your message..." autocomplete="off"
                        class="type_msg" required />
                    <button type="submit" id="send" class="action-btn" title="Send">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            // Speech toggle state (default off)
            let isSpeechEnabled = false;

            $("#toggleSpeech").click(function () {
                isSpeechEnabled = !isSpeechEnabled;
                const icon = $("#speechIcon");
                const btn = $(this);
                if (isSpeechEnabled) {
                    icon.removeClass("fa-volume-mute").addClass("fa-volume-up");
                    btn.attr("title", "Disable Auto-Speech");
                    btn.removeClass("mic");
                } else {
                    icon.removeClass("fa-volume-up").addClass("fa-volume-mute");
                    btn.attr("title", "Enable Auto-Speech");
                    btn.addClass("mic");
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                    }
                }
            });

            // Categories & Sub-options Data
            const categories = {
                "ECE Department": ["Overview", "Subjects", "Career", "Projects", "Overall"],
                "Fees": ["Tuition Fees", "Hostel Fees", "Transport", "Overall"],
                "Hostel": ["HMG Hostel", "Rajagruha Hostel", "Facilities", "Overall"],
                "Placements": ["Highest Package", "Top Recruiters", "Statistics", "Training", "Overall"],
                "Labs": ["VLSI Lab", "Embedded Systems Lab", "Communication Lab", "DSP Lab", "Overall"],
                "Faculty": ["Professors", "Associate Professors", "Assistant Professors", "Overall"],
                "Location": ["Address", "Map", "Transport", "Overall"],
                "Question Papers and Notes": ["1st Year", "2nd Year", "3rd Year", "4th Year"],
                "Presentations": ["Major Project", "Technical Seminar", "Overall"]
            };

            // Populate Categories
            const categorySelect = $("#categorySelect");
            $.each(categories, function (key, value) {
                categorySelect.append($("<option></option>").attr("value", key).text(key));
            });

            // Handle Category Selection
            categorySelect.on("change", function () {
                const selectedCat = $(this).val();
                const subOptionsContainer = $("#subOptionsContainer");
                subOptionsContainer.empty();

                if (selectedCat && categories[selectedCat]) {
                    subOptionsContainer.show();
                    categories[selectedCat].forEach(function (subOpt) {
                        const btn = $("<button></button>")
                            .addClass("sub-option-btn")
                            .text(subOpt)
                            .on("click", function () {
                                // User clicked a sub-option, process it as a message
                                const comboMessage = selectedCat + " - " + subOpt;
                                processMessage(comboMessage);
                            });
                        subOptionsContainer.append(btn);
                    });
                } else {
                    subOptionsContainer.hide();
                }
            });

            // Initialize bot default time
            const initialDate = new Date();
            $(".bot-time").text(initialDate.getHours() + ":" + (initialDate.getMinutes() < 10 ? '0' : '') + initialDate.getMinutes());

            // Process user message
            function processMessage(msgText) {
                if (!msgText.trim()) return;

                // 1. When a new message is sent or received, any ongoing speech must STOP immediately.
                // 2. When switching to a new chat, all previous speech queues must be cleared.
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                }

                const date = new Date();
                const hour = date.getHours();
                const minute = date.getMinutes() < 10 ? '0' + date.getMinutes() : date.getMinutes();
                const str_time = hour + ":" + minute;

                // Render User Message
                const userHtml = `
                <div class="message-wrapper user">
                    <img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="msg-avatar" alt="User">
                    <div class="message-bubble">
                        ${msgText}
                        <span class="msg-time">${str_time}</span>
                    </div>
                </div>
            `;

                $("#text").val("");
                // Append before typing indicator
                $(userHtml).insertBefore("#typingIndicator");
                scrollToBottom();

                // Show typing indicator
                $("#typingIndicator").css("display", "flex");
                scrollToBottom();

                // Send to Bot
                $.ajax({
                    data: { msg: msgText },
                    type: "POST",
                    url: "/get",
                }).done(function (response) {
                    // Hide typing indicator
                    $("#typingIndicator").hide();

                    // Render Bot Message
                    const botHtml = `
                    <div class="message-wrapper bot">
                        <img src="https://i.ibb.co/fSNP7Rz/icons8-chatgpt-512.png" class="msg-avatar" alt="Bot">
                        <div class="message-bubble">
                            ${response.response_text}
                            <span class="msg-time">${str_time}</span>
                        </div>
                    </div>
                `;
                    $(botHtml).insertBefore("#typingIndicator");
                    scrollToBottom();

                    // Text to Speech
                    if ('speechSynthesis' in window && isSpeechEnabled) {
                        // 3. Only the latest message should be spoken.
                        // 4. Prevent overlapping or delayed speech.
                        window.speechSynthesis.cancel();
                        var speech = new SpeechSynthesisUtterance(response.response_text);
                        window.speechSynthesis.speak(speech);
                    }
                }).fail(function (jqXHR, textStatus, errorThrown) {
                    $("#typingIndicator").hide();
                    console.error("Error:", textStatus, errorThrown);
                    const errorHtml = `
                    <div class="message-wrapper bot">
                        <img src="https://i.ibb.co/fSNP7Rz/icons8-chatgpt-512.png" class="msg-avatar" alt="Bot">
                        <div class="message-bubble" style="color:#ef4444;">
                            Sorry, I couldn't connect to the server right now.
                            <span class="msg-time">${str_time}</span>
                        </div>
                    </div>
                `;
                    $(errorHtml).insertBefore("#typingIndicator");
                    scrollToBottom();
                });
            }

            function scrollToBottom() {
                const chatBody = $("#chatBody");
                chatBody.scrollTop(chatBody[0].scrollHeight);
            }

            // Form Submission
            $("#messageArea").on("submit", function (event) {
                event.preventDefault();
                const rawText = $("#text").val();
                processMessage(rawText);
            });

            // Speech Recognition
            $("#startListening").click(function () {
                if ('webkitSpeechRecognition' in window) {
                    // Stop speech if user wants to speak a new query
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                    }
                    const recognition = new webkitSpeechRecognition();
                    recognition.lang = 'en-US';

                    // Visual feedback while speaking
                    $(this).css('background', '#ef4444');
                    $(this).css('color', '#fff');

                    recognition.start();

                    recognition.onresult = function (event) {
                        // Reset styling
                        $("#startListening").css('background', '');
                        $("#startListening").css('color', '');

                        const speechToText = event.results[0][0].transcript;
                        $("#text").val(speechToText);
                        processMessage(speechToText);
                        recognition.stop();
                    }

                    recognition.onerror = function () {
                        $("#startListening").css('background', '');
                        $("#startListening").css('color', '');
                    }
                    recognition.onend = function () {
                        $("#startListening").css('background', '');
                        $("#startListening").css('color', '');
                    }
                } else {
                    alert("Speech recognition is not supported in this browser.");
                }
            });
        });

        // Global search filter for dynamically generated notes lists
        window.filterNotes = function(inputElement, listId) {
            let filter = inputElement.value.toUpperCase();
            let container = document.getElementById(listId);
            if (!container) return;
            
            let items = container.querySelectorAll(".notes-list li");
            items.forEach(function(item) {
                let text = item.textContent || item.innerText;
                if (text.toUpperCase().indexOf(filter) > -1) {
                    item.style.display = "";
                } else {
                    item.style.display = "none";
                }
            });

            // Hide headers if all children are hidden
            let sections = container.querySelectorAll(".subject-section");
            sections.forEach(function(section) {
                let visibleLinks = section.querySelectorAll("li:not([style*='display: none'])");
                if (visibleLinks.length === 0) {
                    section.style.display = "none";
                } else {
                    section.style.display = "block";
                }
            });
        };
    </script>
</body>

</html>
